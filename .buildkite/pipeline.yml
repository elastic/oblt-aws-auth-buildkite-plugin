agents:
  provider: aws
  image: family/core-ubuntu-2204

steps:
  - label: ":test_tube: Unit Tests"
    command: make test

  - label: ":gear: Integration Tests"
    command: make integration-test

  - label: ":lint-roller: Plugin Lint"
    command: make plugin-lint

  - label: ":shell: ShellCheck"
    command: make shellcheck

  - label: ":aws: E2E - Test Plugin Functionality"
    plugins:
      - elastic/oblt-aws-auth#${BUILDKITE_COMMIT}:
          aws-account-id: "697149045717"
    command: make e2e-test

notify:
  - slack: "#observablt-bots
    if: build.branch == "main" && build.state == "failed"
